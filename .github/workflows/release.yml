name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build-daemon:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: ferlay-daemon-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: ferlay-daemon-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-13
            asset: ferlay-daemon-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            asset: ferlay-daemon-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: ferlay-daemon-windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build daemon
        run: cargo build --release --target ${{ matrix.target }} -p furlay-daemon

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/furlay-daemon ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}
          tar czf ${{ matrix.asset }}.tar.gz ${{ matrix.asset }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\furlay-daemon.exe ${{ matrix.asset }}.exe
          Compress-Archive -Path "${{ matrix.asset }}.exe" -DestinationPath "${{ matrix.asset }}.zip"

      - name: Upload release assets (Unix)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}.tar.gz

      - name: Upload release assets (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Build APK
        run: |
          cd app
          flutter pub get
          flutter build apk --release

      - uses: softprops/action-gh-release@v2
        with:
          files: app/build/app/outputs/flutter-apk/app-release.apk

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: relay/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ferlay-relay:latest
            ghcr.io/${{ github.repository_owner }}/ferlay-relay:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
