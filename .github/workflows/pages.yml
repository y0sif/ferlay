name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'assets/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          cp assets/ferlay_logo.png site/logo.png
          cp scripts/install.sh site/install.sh
          cp scripts/install.ps1 site/install.ps1

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          cname: ferlay.dev
