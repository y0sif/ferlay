services:
  relay:
    image: ghcr.io/y0sif/ferlay-relay:latest
    # Or build locally:
    # build:
    #   context: ..
    #   dockerfile: relay/Dockerfile
    environment:
      PORT: "8080"
      RUST_LOG: "ferlay_relay=info"
    ports:
      - "8080:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
