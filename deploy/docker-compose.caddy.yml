services:
  relay:
    image: ghcr.io/y0sif/ferlay-relay:latest
    environment:
      PORT: "8080"
      RUST_LOG: "ferlay_relay=info"
    restart: unless-stopped
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-relay.example.com}
    restart: unless-stopped
    depends_on:
      - relay

volumes:
  caddy_data:
  caddy_config:
