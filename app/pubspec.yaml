name: ferlay
description: "Mobile remote control for Claude Code sessions"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # WebSocket client
  web_socket_channel: ^3.0.3

  # URL launching / deep linking
  url_launcher: ^6.3.2

  # QR code scanning
  mobile_scanner: ^7.2.0

  # Secure credential storage
  flutter_secure_storage: ^10.0.0

  # State management
  flutter_riverpod: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
