name: ferlay
description: "Mobile remote control for Claude Code sessions"
publish_to: 'none'
version: 0.1.0+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # WebSocket client
  web_socket_channel: ^3.0.3

  # URL launching / deep linking
  url_launcher: ^6.3.2

  # QR code scanning
  mobile_scanner: ^7.2.0

  # Secure credential storage
  flutter_secure_storage: ^10.0.0

  # State management
  flutter_riverpod: ^3.3.1

  # E2E encryption (X25519 + AES-256-GCM + HKDF)
  cryptography: ^2.7.0

  # HMAC-SHA256 for manual HKDF implementation (matching Rust output)
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ferlay_logo.png"
  adaptive_icon_background: "#7C4DFF"
  adaptive_icon_foreground: "assets/images/ferlay_logo.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#1C1B1F"
  image: "assets/images/ferlay_splash.png"
  image_dark: "assets/images/ferlay_splash.png"
  color_dark: "#1C1B1F"
  android_12:
    color: "#1C1B1F"
    image: "assets/images/ferlay_splash.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/ferlay_logo.png
